<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Drivers - Browse & Search</title>
    <link rel="stylesheet" href="/static/global.css">
    <link rel="stylesheet" href="/static/drivers.css">
    <style>
        body {
            background: #0a0a0a;
            color: #ffffff;
        }
        
        .search-container {
            background: #1a1a1a;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(225, 6, 0, 0.1);
            border: 1px solid #333;
            margin-bottom: 2rem;
        }
        
        .search-input-group {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .search-input {
            padding: 0.75rem 1rem;
            border: 2px solid #444;
            border-radius: 6px;
            font-size: 1rem;
            background: #2a2a2a;
            color: #ffffff;
            transition: border-color 0.3s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #e10600;
        }
        
        .search-input::placeholder {
            color: #888;
        }
        
        .search-stats {
            color: #aaa;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
        
        .driver-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        
        .driver-card {
            background: #1a1a1a;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #333;
            box-shadow: 0 2px 8px rgba(225, 6, 0, 0.1);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: #ffffff;
            display: block;
        }
        
        .driver-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 16px rgba(225, 6, 0, 0.3);
            border-color: #e10600;
        }
        
        .driver-card-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: #e10600;
            margin-bottom: 0.5rem;
        }
        
        .driver-card-info {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
        }
        
        .driver-card-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #e0e0e0;
        }
        
        .mini-stat {
            text-align: center;
        }
        
        .mini-stat-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: #333;
        }
        
        .mini-stat-label {
            font-size: 0.75rem;
            color: #999;
            text-transform: uppercase;
        }
        
        .no-results {
            text-align: center;
            padding: 3rem;
            color: #666;
        }
        
        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        
        .filter-tag {
            padding: 0.5rem 1rem;
            background: #f5f5f5;
            border: none;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .filter-tag:hover {
            background: #e10600;
            color: white;
        }
        
        .filter-tag.active {
            background: #e10600;
            color: white;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <a href="/" class="logo">F1 Stats</a>
        <nav class="nav-links">
            <a href="/static/drivers-list.html" class="active">Drivers</a>
            <a href="/static/constructors-list.html">Teams</a>
            <a href="/static/results.html">Seasons</a>
            <a href="/static/compare.html">Compare</a>
            <a href="/docs" target="_blank" class="api-link">API</a>
        </nav>
    </div>
    
    <!-- Main Content -->
    <div class="container" style="padding-top: 100px;">
        <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">F1 Drivers Database</h1>
        <p style="color: #666; margin-bottom: 2rem;">Browse and search through Formula 1 drivers from 1984-2024</p>
        
        <!-- Search & Filter -->
        <div class="search-container">
            <div class="search-input-group">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="Search by driver name (e.g., Hamilton, Verstappen, Alonso)..."
                    autocomplete="off"
                >
                <select id="nationalityFilter" class="search-input">
                    <option value="">All Nationalities</option>
                </select>
            </div>
            
            <div class="search-stats" id="searchStats">
                Loading drivers...
            </div>
            
            <div class="filter-tags" id="filterTags"></div>
        </div>
        
        <!-- Driver Cards -->
        <div id="driverResults">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading driver database...</p>
            </div>
        </div>
    </div>
    
    <script type="module" src="/static/js/pages/driver-list.js"></script>
</body>
</html>
