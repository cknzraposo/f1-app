<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Drivers - Browse & Search</title>
    <link rel="stylesheet" href="/static/global.css">
    <link rel="stylesheet" href="/static/drivers.css">
    <link rel="stylesheet" href="/static/driver-list.css">
</head>
<body>
    <!-- Header -->
    <div class="header">
        <a href="/" class="logo">F1 Stats</a>
        <nav class="nav-links">
            <a href="/static/drivers-list.html" class="active">Drivers</a>
            <a href="/static/constructors-list.html">Teams</a>
            <a href="/static/results.html">Seasons</a>
            <a href="/static/compare.html">Compare</a>
            <a href="/docs" target="_blank" class="api-link">API</a>
        </nav>
    </div>
    
    <!-- Main Content -->
    <div class="container" style="padding-top: 100px;">
        <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">F1 Drivers Database</h1>
        <p style="color: #666; margin-bottom: 2rem;">Browse and search through Formula 1 drivers from 1984-2024</p>
        
        <!-- Search & Filter -->
        <div class="search-container">
            <div class="search-input-group">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="Search by driver name (e.g., Hamilton, Verstappen, Alonso)..."
                    autocomplete="off"
                >
                <select id="nationalityFilter" class="search-input">
                    <option value="">All Nationalities</option>
                </select>
            </div>
            
            <div class="search-stats" id="searchStats">
                Loading drivers...
            </div>
            
            <div class="filter-tags" id="filterTags"></div>
        </div>
        
        <!-- Driver Cards -->
        <div id="driverResults">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading driver database...</p>
            </div>
        </div>
    </div>
    
    <script type="module" src="/static/js/pages/driver-list.js"></script>
</body>
</html>
