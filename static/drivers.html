<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Profile - F1 Stats</title>
    <link rel="stylesheet" href="/static/global.css">
    <link rel="stylesheet" href="/static/drivers.css">
</head>
<body>
    <!-- Header -->
    <div class="header">
        <a href="/" class="logo">F1 Stats</a>
        <nav class="nav-links">
            <a href="/static/drivers-list.html" class="active">Drivers</a>
            <a href="/static/constructors-list.html">Teams</a>
            <a href="/static/results.html">Seasons</a>
            <a href="/static/compare.html">Compare</a>
            <a href="/docs" target="_blank" class="api-link">API</a>
        </nav>
    </div>
    
    <!-- Main Content -->
    <div class="container" style="padding-top: 100px;">
        <!-- Driver Profile -->
        <div class="driver-profile-header" id="driverProfile">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading driver profile...</p>
            </div>
        </div>
        
        <!-- Career Statistics -->
        <div class="card">
            <div class="section-header">Career Statistics</div>
            <div id="careerStats">
                <div class="loading">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </div>
        
        <!-- Teams -->
        <div class="card">
            <div class="section-header">Teams</div>
            <div id="teamsSection">
                <div class="loading">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </div>
        
        <!-- Season by Season History -->
        <div class="card">
            <div class="section-header">Season by Season</div>
            <div id="seasonHistory">
                <div class="loading">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </div>
        
        <!-- Race Results -->
        <div class="card">
            <div class="section-header">Race Results</div>
            <div id="raceResults">
                <div class="loading">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script type="module" src="/static/js/pages/driver-profile.js"></script>
</body>
</html>
