<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Season Results - F1 Stats</title>
    <link rel="stylesheet" href="/static/global.css">
    <style>
        body {
            background: #0a0a0a;
            color: #ffffff;
            padding-top: 80px;
        }
        
        .season-selector {
            margin: 2rem 0;
            text-align: center;
        }
        
        .year-navigation {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }
        
        .year-button {
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, #e10600 0%, #c00000 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        
        .year-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(225, 6, 0, 0.3);
        }
        
        .year-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .year-display {
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a1a;
            min-width: 120px;
        }
        
        .season-tabs {
            display: flex;
            gap: 1rem;
            margin: 2rem 0;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .tab-button {
            padding: 1rem 2rem;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            color: #666;
            transition: all 0.2s ease;
        }
        
        .tab-button.active {
            color: #e10600;
            border-bottom-color: #e10600;
        }
        
        .tab-button:hover {
            color: #e10600;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .races-table, .standings-table {
            width: 100%;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-top: 1rem;
        }
        
        .races-table th, .standings-table th {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: white;
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
        }
        
        .races-table th:hover, .standings-table th:hover {
            background: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%);
        }
        
        .races-table td, .standings-table td {
            padding: 1rem;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .races-table tr:last-child td, .standings-table tr:last-child td {
            border-bottom: none;
        }
        
        .races-table tbody tr:hover, .standings-table tbody tr:hover {
            background: #f8f8f8;
        }
        
        .position-badge {
            display: inline-block;
            width: 32px;
            height: 32px;
            line-height: 32px;
            text-align: center;
            border-radius: 50%;
            font-weight: 700;
            color: white;
        }
        
        .position-1 { background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); }
        .position-2 { background: linear-gradient(135deg, #C0C0C0 0%, #A8A8A8 100%); }
        .position-3 { background: linear-gradient(135deg, #CD7F32 0%, #B87333 100%); }
        .position-other { background: linear-gradient(135deg, #666 0%, #555 100%); }
        
        .driver-link, .constructor-link {
            color: #e10600;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }
        
        .driver-link:hover, .constructor-link:hover {
            color: #c00000;
            text-decoration: underline;
        }
        
        .stats-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }
        
        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .stat-label {
            font-size: 0.875rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a1a;
        }
        
        .champion-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #1a1a1a;
            font-weight: 700;
            border-radius: 20px;
            margin-left: 0.5rem;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .error-message {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
        }
        
        .seasons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }
        
        .season-card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        
        .season-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(135deg, #e10600 0%, #c00000 100%);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }
        
        .season-card:hover::before {
            transform: scaleX(1);
        }
        
        .season-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(225, 6, 0, 0.2);
        }
        
        .season-year {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
        }
        
        .season-meta {
            font-size: 0.875rem;
            color: #666;
        }
        
        .season-decade-header {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a1a;
            margin: 3rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #e10600;
        }
        
        .season-decade-header:first-child {
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <a href="/" class="logo">🏎️ F1 Stats</a>
        <nav class="nav-links">
            <a href="/static/drivers-list.html">Drivers</a>
            <a href="/static/constructors-list.html">Teams</a>
            <a href="/static/results.html" class="active">Seasons</a>
            <a href="/static/compare.html">Compare</a>
            <a href="/docs" target="_blank" class="api-link">API</a>
        </nav>
    </div>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="container">
        <h1 style="text-align: center; margin: 2rem 0;">Formula 1 Season Results</h1>
        
        <!-- Seasons List View (default) -->
        <div id="seasonsListView">
            <div style="text-align: center; margin: 2rem 0;">
                <p style="color: #666; font-size: 1.1rem;">Select a season to view detailed race results and standings</p>
            </div>
            <div id="seasonsTableContainer"></div>
        </div>
        
        <!-- Season Detail View (hidden by default) -->
        <div id="seasonDetailView" style="display: none;">
            <!-- Back Button -->
            <div style="margin: 2rem 0;">
                <button class="year-button" onclick="showSeasonsList()" style="background: #666;">
                    ← Back to All Seasons
                </button>
            </div>
            
            <!-- Season Selector -->
            <div class="season-selector">
                <div class="year-navigation">
                    <button class="year-button" id="prevYear">
                        ← Previous
                    </button>
                    <div class="year-display" id="currentYear">2023</div>
                    <button class="year-button" id="nextYear">
                        Next →
                    </button>
                </div>
            </div>
            
            <!-- Season Tabs -->
            <div class="season-tabs">
                <button class="tab-button active" onclick="switchTab('summary')">Summary</button>
                <button class="tab-button" onclick="switchTab('races')">Race Results</button>
                <button class="tab-button" onclick="switchTab('drivers')">Driver Standings</button>
                <button class="tab-button" onclick="switchTab('constructors')">Constructor Standings</button>
            </div>
            
            <!-- Tab Contents -->
            <div id="summaryTab" class="tab-content active">
                <div id="summaryContent"></div>
            </div>
            
            <div id="racesTab" class="tab-content">
                <div id="racesContent"></div>
            </div>
            
            <div id="driversTab" class="tab-content">
                <div id="driversContent"></div>
            </div>
            
            <div id="constructorsTab" class="tab-content">
                <div id="constructorsContent"></div>
            </div>
        </div>
    </div>
    
    <script type="module" src="/static/js/pages/season-browser.js"></script>
</body>
</html>
